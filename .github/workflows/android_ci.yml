name: Android CI

on:
  push:
    branches: [ develop, main ]
  pull_request:

permissions:
  actions: write
  contents: read

jobs:

  quality_and_build_release:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel Previous Workflow Runs
        uses: n1hility/cancel-previous-runs@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup JDK Zulu 21
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check Ktlint
        run: ./gradlew ktlintCheck

      - name: Debug Unit tests
        run: ./gradlew koverHtmlReportDebug

      - name: Assemble Release
        env:
          JETPACK_GOOGLE_MAPS_API_KEY: ${{ secrets.JETPACK_GOOGLE_MAPS_API_KEY }}
        run: ./gradlew app:assembleRelease

      - name: Decode Keystore
        run: |
          echo "${{ secrets.STORE_FILE }}" | base64 -d > keystore.jks

      - name: Sign Release APK
        uses: ilharp/sign-android-release@v2
        id: sign_app
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: keystore.jks
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: "36.0.0"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Signed Release APK
          path: ${{steps.sign_app.outputs.signedFile}}
